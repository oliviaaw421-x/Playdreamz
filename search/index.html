<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — PlayDreamz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:#f8f8f8;color:#1D164A;min-height:100vh}
    header{background:#1D164A;padding:16px 32px;display:flex;align-items:center;gap:24px}
    header a.logo{display:flex;align-items:center;text-decoration:none}
    header a.logo img{height:36px;width:auto}
    header a.back{color:rgba(255,255,255,0.7);font-size:0.9rem;text-decoration:none}
    header a.back:hover{color:#fff}
    .search-wrap{background:#1D164A;padding:0 32px 32px}
    .search-bar{display:flex;gap:0;max-width:720px}
    .search-bar input{flex:1;padding:14px 20px;border:none;border-radius:10px 0 0 10px;font-family:'Poppins',sans-serif;font-size:1rem;outline:none;color:#1D164A}
    .search-bar button{padding:14px 22px;background:#fff;border:none;border-radius:0 10px 10px 0;cursor:pointer;border-left:2px solid #eee}
    .search-bar button svg{display:block}
    .content{max-width:760px;margin:40px auto;padding:0 24px 60px}
    #search-heading{font-family:'Teko',sans-serif;font-size:1.8rem;font-weight:400;margin-bottom:28px;color:#1D164A}
    .result{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(29,22,74,0.07);transition:box-shadow 0.2s;display:flex;gap:16px;align-items:flex-start}
    .result:hover{box-shadow:0 4px 16px rgba(29,22,74,0.13)}
    .result-thumb{flex-shrink:0;width:100px;height:62px;border-radius:8px;object-fit:cover;background:#eee}
    .result-thumb-placeholder{flex-shrink:0;width:100px;height:62px;border-radius:8px;background:linear-gradient(135deg,#1D164A 0%,#2d2470 100%);display:flex;align-items:center;justify-content:center}
    .result-thumb-placeholder svg{opacity:0.35}
    .result-body{flex:1;min-width:0}
    .result h2{font-family:'Teko',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:6px}
    .result h2 a{color:#1D164A;text-decoration:none}
    .result h2 a:hover{text-decoration:underline}
    .result p{font-size:0.88rem;color:#555;line-height:1.6}
    .result p mark{background:rgba(29,22,74,0.12);color:#1D164A;border-radius:3px;padding:0 2px}
    .result-meta{font-size:0.78rem;color:#888;margin-top:8px}
    #status{color:#888;font-size:0.95rem;margin-bottom:20px}
    #no-results{text-align:center;padding:60px 0;color:#888}
    #no-results h2{font-family:'Teko',sans-serif;font-size:1.5rem;font-weight:400;margin-bottom:8px;color:#1D164A}
    .pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:32px;padding-bottom:8px}
    .pagination button{border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:0.9rem;border-radius:8px;padding:8px 14px;background:#fff;color:#1D164A;box-shadow:0 1px 4px rgba(29,22,74,0.1);transition:background 0.15s}
    .pagination button:hover{background:#ede9ff}
    .pagination button.active{background:#1D164A;color:#fff;font-weight:600}
    .pagination button.pg-prev,.pagination button.pg-next{font-weight:500}
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><img src="/wp-content/uploads/2026/01/play-dreamz-logo.webp" alt="PlayDreamz"></a>
    <a href="/" class="back">← Back to Home</a>
  </header>
  <div class="search-wrap">
    <form class="search-bar" id="search-form">
      <input type="search" id="search-input" placeholder="Search PlayDreamz..." autocomplete="off">
      <button type="submit" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1D164A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </form>
  </div>
  <div class="content">
    <p id="search-heading"></p>
    <p id="status"></p>
    <div id="results"></div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var initialQ = params.get('q') || '';
    var input = document.getElementById('search-input');
    var form = document.getElementById('search-form');
    var heading = document.getElementById('search-heading');
    var status = document.getElementById('status');
    var resultsEl = document.getElementById('results');
    var pf = null;
    var allResults = [];
    var PAGE_SIZE = 10;

    import('/pagefind/pagefind.js').then(function(m) {
      pf = m;
      return pf.options({excerptLength: 30, language: "en-us"});
    }).then(function() {
      if (initialQ) {
        input.value = initialQ;
        runSearch(initialQ);
      }
    }).catch(function() {
      if (initialQ) {
        status.textContent = '';
        resultsEl.innerHTML = '<p style="color:#888">Search index not ready. Please try again shortly.</p>';
      }
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var q = input.value.trim();
      if (!q) return;
      history.pushState({}, '', '/search/?q=' + encodeURIComponent(q));
      runSearch(q);
    });

    function runSearch(q) {
      heading.textContent = 'Search results for "' + q + '"';
      status.textContent = 'Searching...';
      resultsEl.innerHTML = '';
      allResults = [];
      if (!pf) {
        import('/pagefind/pagefind.js').then(function(m) { pf = m; doSearch(q); });
        return;
      }
      doSearch(q);
    }

    function doSearch(q) {
      pf.search(q).then(function(search) {
        allResults = search.results;
        var total = allResults.length;
        status.textContent = total + ' result' + (total !== 1 ? 's' : '') + ' found';
        if (total === 0) {
          resultsEl.innerHTML = '<div id="no-results"><h2>No results found</h2><p>Try different keywords.</p></div>';
          return;
        }
        showPage(1);
      }).catch(function() {
        status.textContent = '';
        resultsEl.innerHTML = '<p style="color:#888">Search error. Please try again.</p>';
      });
    }

    function showPage(page) {
      var total = allResults.length;
      var totalPages = Math.ceil(total / PAGE_SIZE);
      var start = (page - 1) * PAGE_SIZE;
      var pageResults = allResults.slice(start, start + PAGE_SIZE);

      resultsEl.innerHTML = '';
      var done = 0;
      var cards = new Array(pageResults.length);
      pageResults.forEach(function(r, i) {
        r.data().then(function(data) {
          var card = document.createElement('div');
          card.className = 'result';
          var thumbHtml = data.meta.image
            ? '<img class="result-thumb" src="' + data.meta.image + '" alt="" loading="lazy">'
            : '<div class="result-thumb-placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
          var metaParts = [];
          if (data.meta.author) metaParts.push('By ' + data.meta.author);
          if (data.meta.date) metaParts.push(new Date(data.meta.date).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}));
          card.innerHTML = thumbHtml
            + '<div class="result-body"><h2><a href="' + data.url + '">' + (data.meta.title || 'PlayDreamz Page') + '</a></h2>'
            + '<p>' + data.excerpt + '</p>'
            + (metaParts.length ? '<div class="result-meta">' + metaParts.join(' · ') + '</div>' : '') + '</div>';
          cards[i] = card;
          if (++done === pageResults.length) {
            cards.forEach(function(c) { resultsEl.appendChild(c); });
            if (totalPages > 1) renderPagination(page, totalPages);
          }
        });
      });
    }

    function renderPagination(page, totalPages) {
      var pag = document.createElement('div');
      pag.className = 'pagination';
      if (page > 1) {
        var prev = document.createElement('button');
        prev.className = 'pg-prev';
        prev.textContent = '← Prev';
        prev.onclick = function() { showPage(page - 1); window.scrollTo(0, 0); };
        pag.appendChild(prev);
      }
      for (var i = 1; i <= totalPages; i++) {
        (function(p) {
          var btn = document.createElement('button');
          btn.textContent = p;
          if (p === page) btn.className = 'active';
          btn.onclick = function() { showPage(p); window.scrollTo(0, 0); };
          pag.appendChild(btn);
        })(i);
      }
      if (page < totalPages) {
        var next = document.createElement('button');
        next.className = 'pg-next';
        next.textContent = 'Next →';
        next.onclick = function() { showPage(page + 1); window.scrollTo(0, 0); };
        pag.appendChild(next);
      }
      resultsEl.appendChild(pag);
    }
  </script>
</body>
</html>
