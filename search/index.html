<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — PlayDreamz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:#f8f8f8;color:#1D164A;min-height:100vh}
    header{background:#1D164A;padding:16px 32px;display:flex;align-items:center;gap:24px}
    header a.logo{color:#fff;font-family:'Teko',sans-serif;font-size:1.6rem;font-weight:700;text-decoration:none;letter-spacing:0.5px}
    header a.back{color:rgba(255,255,255,0.7);font-size:0.9rem;text-decoration:none}
    header a.back:hover{color:#fff}
    .search-wrap{background:#1D164A;padding:0 32px 32px}
    .content{max-width:760px;margin:40px auto;padding:0 24px 60px}

    /* PagefindUI overrides */
    #pd-search-page{--pagefind-ui-scale:1;--pagefind-ui-primary:#1D164A;--pagefind-ui-text:#1D164A;--pagefind-ui-background:#fff;--pagefind-ui-border:#e0e0e0;--pagefind-ui-tag:#f0f0f0;font-family:'Poppins',sans-serif}
    #pd-search-page .pagefind-ui__search-input{font-family:'Poppins',sans-serif;font-size:1rem;border-radius:10px 0 0 10px;border:none;padding:14px 20px;color:#1D164A}
    #pd-search-page .pagefind-ui__search-clear{background:#fff;border-radius:0 10px 10px 0;border:none;border-left:2px solid #eee}
    #pd-search-page .pagefind-ui__form{max-width:720px}
    #pd-search-page .pagefind-ui__result{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(29,22,74,0.07);border:none}
    #pd-search-page .pagefind-ui__result:hover{box-shadow:0 4px 16px rgba(29,22,74,0.13)}
    #pd-search-page .pagefind-ui__result-title{font-family:'Teko',sans-serif;font-size:1.3rem;font-weight:700}
    #pd-search-page .pagefind-ui__result-link{color:#1D164A;text-decoration:none}
    #pd-search-page .pagefind-ui__result-link:hover{text-decoration:underline}
    #pd-search-page .pagefind-ui__result-excerpt{font-size:0.88rem;color:#555;line-height:1.6}
    #pd-search-page .pagefind-ui__result-excerpt mark{background:rgba(29,22,74,0.12);color:#1D164A;border-radius:3px;padding:0 2px}
    #pd-search-page .pagefind-ui__message{color:#888;font-size:0.95rem;font-family:'Poppins',sans-serif}
    #pd-search-page .pagefind-ui__results-area{margin-top:32px}
    #pd-search-page .pagefind-ui__button{background:#1D164A;color:#fff;border-radius:8px;font-family:'Poppins',sans-serif;border:none}
    #pd-search-page .pagefind-ui__button:hover{background:#2d2570}
    #pd-search-page .pagefind-ui__result-image{display:none}
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">PlayDreamz</a>
    <a href="/" class="back">← Back to Home</a>
  </header>
  <div class="search-wrap">
    <div id="pd-search-page"></div>
  </div>
  <script>
    var q = new URLSearchParams(window.location.search).get('q') || '';
    var s = document.createElement('script');
    s.src = '/pagefind/pagefind-ui.js';
    s.onload = function() {
      new PagefindUI({
        element: '#pd-search-page',
        showImages: false,
        excerptLength: 30,
        resetStyles: false,
        bundlePath: '/pagefind/'
      });
      if (q) {
        setTimeout(function() {
          var inp = document.querySelector('#pd-search-page input');
          if (inp) {
            inp.value = q;
            inp.dispatchEvent(new Event('input', {bubbles: true}));
          }
        }, 80);
      }
    };
    document.head.appendChild(s);
  </script>
</body>
</html>
